<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sensor Sim Y800 - Full Vehicle Specs</title>
    <style>
        body { margin: 0; background: #111; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; flex-direction: column; }
        #camera-viewport { width: 640px; height: 480px; border: 2px solid #333; position: relative; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        #y800-preview { position: absolute; bottom: 45px; left: 15px; width: 160px; height: 120px; border: 1px solid #0f0; background: #000; }
        #monitor-canvas { width: 100%; height: 100%; transform: scaleY(-1); image-rendering: pixelated; }
        .label { position: absolute; top: -18px; left: 0; color: #0f0; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .info { position: absolute; bottom: -18px; left: 0; color: #0f0; font-size: 9px; white-space: nowrap; opacity: 0.8; }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "three": "three.module.js",
            "lil-gui": "lil-gui.esm.js"
        }
    }
    </script>
    
</head>
<body>
    <div id="camera-viewport">
        <div id="y800-preview">
            <span class="label">REC_STREAM: Y800_RAW</span>
            <canvas id="monitor-canvas"></canvas>
            <span class="info">640x480 | 8-BIT MONO</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GUI } from 'lil-gui';

        const S_W = 640, S_H = 480;
        const scene = new THREE.Scene();
        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(S_W, S_H);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('camera-viewport').appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(50, S_W / S_H, 0.1, 1000);
        camera.rotation.order = 'YXZ';

        // --- 1. ДОРОГА ---
        const roadLen = 200;
        const roadGroup = new THREE.Group();
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0.0 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(9, roadLen), roadMat);
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        roadGroup.add(ground);

        const lineMat = new THREE.MeshBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.5 }); 
        for(let i = -roadLen/2; i < roadLen/2; i += 12) { 
            const l = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 3), lineMat); 
            l.rotation.x = -Math.PI / 2; l.position.set(0, 0.005, i);
            roadGroup.add(l);
        }
        [-3.5, 3.5].forEach(x => { 
            const edge = new THREE.Mesh(new THREE.PlaneGeometry(0.1, roadLen), lineMat); 
            edge.rotation.x = -Math.PI / 2; edge.position.set(x, 0.004, 0);
            roadGroup.add(edge);
        });
        scene.add(roadGroup);

        // --- ДОЖДЬ (Глобальный) ---
        const rainCount = 8000;
        const rainGeo = new THREE.BufferGeometry();
        const rainPos = new Float32Array(rainCount * 3);
        for(let i=0; i<rainCount*3; i+=3) {
            rainPos[i] = (Math.random() - 0.5) * 50; 
            rainPos[i+1] = Math.random() * 30;
            rainPos[i+2] = (Math.random() - 0.5) * roadLen;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMatr = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.04, transparent: true, opacity: 0 });
        const rain = new THREE.Points(rainGeo, rainMatr);
        scene.add(rain);

        // --- 2. МАШИНА ---
        const carGroup = new THREE.Group();
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0x880000 }));
        carBody.castShadow = true; 
        carGroup.add(carBody);
        scene.add(carGroup);

        const createHL = () => {
            const l = new THREE.SpotLight(0xffffcc, 0, 80, Math.PI/4, 0.3);
            l.castShadow = true;
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            scene.add(l, l.target, b);
            return { l, b };
        };
        const headL = createHL(), headR = createHL(), headC = createHL();

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.castShadow = true;
        sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
        sun.shadow.camera.top = 20; sun.shadow.camera.bottom = -20;
        sun.shadow.mapSize.set(1024, 1024);
        scene.add(sun, sun.target, new THREE.AmbientLight(0xffffff, 0.1));

        // --- 3. НАСТРОЙКИ ---
        const settings = {
            fps: 15, speed: 40, vWidth: 1.8, vHeight: 1.5, vLength: 4.5,
            camX: 0, camY: 5, camZ: 30, rotX: -30, rotY: 0, fov: 50,
            sunLat: 25, sunIntensity: 1, noiseIntensity: 25, lightPower: 80,
            wetRoad: false, rain: false, rainIntensity: 0.3, 
            fog: false, fogDensity: 0.05
        };

        const gui = new GUI();
        gui.add(settings, 'fps', 5, 30, 1).name('Sensor FPS');
        const vF = gui.addFolder('Транспорт');
        vF.add(settings, 'vWidth', 1, 3); 
        vF.add(settings, 'vHeight', 0.8, 4.5); // Вернул высоту
        vF.add(settings, 'vLength', 1.5, 20);  // Вернул длину
        vF.add(settings, 'speed', 0, 150);
        
        const eF = gui.addFolder('Эффекты');
        eF.add(settings, 'noiseIntensity', 0, 100).name('Цифровой шум');
        eF.add(settings, 'wetRoad').name('Мокрый асфальт').onChange(v => {
            roadMat.roughness = v ? 0.1 : 0.9;
            roadMat.metalness = v ? 0.4 : 0.0;
            roadMat.color.setHex(v ? 0x080808 : 0x1a1a1a);
        });
        eF.add(settings, 'rain').name('Дождь');
        eF.add(settings, 'rainIntensity', 0.1, 1.0).name('Плотность дождя');
        eF.add(settings, 'fog').name('Туман').onChange(v => {
            scene.fog = v ? new THREE.FogExp2(0x000000, settings.fogDensity) : null;
        });
        eF.add(settings, 'fogDensity', 0.01, 0.2).name('Плотность тумана').onChange(v => {
            if (scene.fog) scene.fog.density = v;
        });

        const cF = gui.addFolder('Камера');
        cF.add(settings, 'camX', -5, 5); cF.add(settings, 'camY', 3, 10);
        cF.add(settings, 'rotX', -45, -30); 
        cF.add(settings, 'rotY', -30, 30);
        cF.add(settings, 'fov', 40, 70).onChange(v => { camera.fov = v; camera.updateProjectionMatrix(); });

        const mCanvas = document.getElementById('monitor-canvas'), mCtx = mCanvas.getContext('2d');
        mCanvas.width = S_W; mCanvas.height = S_H;

        function capture() {
            const gl = renderer.getContext();
            const px = new Uint8Array(S_W * S_H * 4);
            gl.readPixels(0, 0, S_W, S_H, gl.RGBA, gl.UNSIGNED_BYTE, px);
            const img = mCtx.createImageData(S_W, S_H);
            for (let i = 0; i < S_W * S_H; i++) {
                const j = i * 4;
                let y = 0.299*px[j] + 0.587*px[j+1] + 0.114*px[j+2];
                const noise = (Math.random() - 0.5) * settings.noiseIntensity;
                y = Math.min(255, Math.max(0, y + noise));
                img.data[j] = img.data[j+1] = img.data[j+2] = y; img.data[j+3] = 255;
            }
            mCtx.putImageData(img, 0, 0);
        }

        let lastT = 0;
        function animate(t) {
            requestAnimationFrame(animate);
            const dt = (t - lastT) / 1000 || 0; 
            lastT = t;
            
            carBody.scale.set(settings.vWidth, settings.vHeight, settings.vLength);
            carGroup.position.set(1.75, (settings.vHeight / 2) + 0.2, carGroup.position.z + (settings.speed / 3.6) * dt);
            if (carGroup.position.z > roadLen/2) carGroup.position.z = -roadLen/2;

            if (settings.rain) {
                rainMatr.opacity = settings.rainIntensity;
                const posArr = rain.geometry.attributes.position.array;
                const rainSpeed = settings.rainIntensity * 1.5;
                for (let i = 1; i < posArr.length; i += 3) {
                    posArr[i] -= rainSpeed;
                    if (posArr[i] < 0) posArr[i] = 30; 
                }
                rain.geometry.attributes.position.needsUpdate = true;
            } else { rainMatr.opacity = 0; }

            const phi = THREE.MathUtils.degToRad(90 - settings.sunLat);
            sun.position.setFromSphericalCoords(100, phi, Math.PI/2);
            sun.position.z += carGroup.position.z;
            sun.target.position.set(carGroup.position.x, 0, carGroup.position.z);
            sun.target.updateMatrixWorld();

            const frontZ = carGroup.position.z + (settings.vLength / 2);
            const hY = 0.5;
            const tiltRad = THREE.MathUtils.degToRad(1.5);
            const targetY = hY - (Math.tan(tiltRad) * 20);

            [headL, headR, headC].forEach(h => { h.l.intensity = 0; h.b.visible = false; });

            if (settings.vWidth <= 1.0) {
                headC.l.intensity = settings.lightPower;
                headC.l.position.set(carGroup.position.x, hY, frontZ);
                headC.l.target.position.set(carGroup.position.x, targetY, frontZ + 20);
                headC.b.position.copy(headC.l.position); headC.b.visible = true;
            } else {
                const posX = (settings.vWidth / 2) - 0.2; 
                [headL, headR].forEach((h, i) => {
                    const curX = carGroup.position.x + (posX * (i === 0 ? -1 : 1));
                    h.l.intensity = settings.lightPower;
                    h.l.position.set(curX, hY, frontZ);
                    h.l.target.position.set(curX, targetY, frontZ + 20);
                    h.b.position.copy(h.l.position); h.b.visible = true;
                });
            }

            sun.intensity = settings.sunIntensity;
            camera.position.set(settings.camX, settings.camY, settings.camZ);
            camera.rotation.set(THREE.MathUtils.degToRad(settings.rotX), THREE.MathUtils.degToRad(settings.rotY), 0);

            renderer.render(scene, camera);
            capture();
        }

        animate(0);
    </script>
</body>
</html>
