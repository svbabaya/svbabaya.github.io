<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовая страница</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #2ecc71; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; background: #3498db; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Сайт работает! ✅</h1>
        <p>Это тестовая страница для проверки GitHub Pages.</p>
        <p>Путь к этой странице: <code id="path"></code></p>
        <button onclick="alert('JS тоже работает!')">Проверить JS</button>
    </div>

    <script>
        document.getElementById('path').textContent = window.location.pathname;
    </script>
</body>
</html>
